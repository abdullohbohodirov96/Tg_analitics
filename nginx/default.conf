# Nginx reverse proxy konfiguratsiyasi
# API va Webhook so'rovlarni FastAPI ga yo'naltiradi
# Static fayllarni to'g'ridan-to'g'ri xizmat qiladi

upstream fastapi {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    # Dashboard static fayllar
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Login sahifa
    location = /login {
        root /usr/share/nginx/html;
        try_files /login.html =404;
    }

    # Static assets (CSS, JS)
    location /static/ {
        root /usr/share/nginx/html;
        rewrite ^/static/(.*) /$1 break;
    }

    # API so'rovlar → FastAPI
    location /api/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook → FastAPI
    location /webhook/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger docs → FastAPI
    location /docs {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://fastapi;
    }
}
