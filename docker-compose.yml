version: "3.9"

services:
  # ===== PostgreSQL Database =====
  db:
    image: postgres:16-alpine
    container_name: tg_analytics_db
    restart: always
    environment:
      POSTGRES_DB: telegram_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===== FastAPI Application =====
  app:
    build: .
    container_name: tg_analytics_app
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  # ===== Nginx Reverse Proxy =====
  nginx:
    image: nginx:alpine
    container_name: tg_analytics_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./dashboard:/usr/share/nginx/html
    depends_on:
      - app

volumes:
  pgdata:
