<!DOCTYPE html>
<html lang="uz" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Analytics Dashboard</title>
    <meta name="description" content="Telegram guruhlar uchun professional analytics dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar Overlay (mobile) -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">📊</div>
                <div>
                    <h1>Analytics</h1>
                    <p>Telegram Dashboard</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Asosiy</div>
                    <button class="nav-item active" data-view="overview">
                        <span class="icon">📊</span> Overview
                    </button>
                    <button class="nav-item" data-view="tasks">
                        <span class="icon">✅</span> Vazifalar
                    </button>
                    <button class="nav-item" data-view="history">
                        <span class="icon">📜</span> Tarix
                    </button>
                    <button class="nav-item" data-view="users">
                        <span class="icon">👥</span> Foydalanuvchilar
                    </button>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button class="theme-toggle" id="themeToggle">
                    ☀️ Light mode
                </button>
                <button class="logout-btn" id="logoutBtn">
                    🚪 Chiqish
                </button>
            </div>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle">☰</button>
                    <h2 id="pageTitle">📊 Overview</h2>
                </div>
                <div class="header-right">
                    <div class="filter-bar">
                        <div class="group-selector-container">
                            <select id="groupSelector" class="group-dropdown">
                                <option value="all">Barcha guruhlar</option>
                                <!-- Guruhlar dinamik yuklanadi -->
                            </select>
                        </div>
                        <div class="group-filter hidden" id="groupIcons">
                            <!-- Guruh iconlari dinamik yuklanadi -->
                        </div>
                        <button class="filter-btn" data-period="today">Bugun</button>
                        <button class="filter-btn" data-period="yesterday">Kecha</button>
                        <button class="filter-btn active" data-period="week">7 kun</button>
                        <button class="filter-btn" data-period="month">30 kun</button>
                        <div class="filter-custom">
                            <input type="date" id="dateFrom" title="Boshlanish sanasi">
                            <span style="color:var(--text-muted)">—</span>
                            <input type="date" id="dateTo" title="Tugash sanasi">
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content" id="pageContent">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Chat Details Modal -->
    <div id="chatModal" class="modal-overlay hidden">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="chatModalTitle">Suhbatlar tafsiloti</h3>
                <button class="modal-close" id="chatModalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-loading hidden" id="chatModalLoading">Yuklanmoqda...</div>
                <div class="chat-list" id="chatModalContent"></div>
            </div>
        </div>
    </div>

    <!-- Group Settings Modal -->
    <div id="groupSettingsModal" class="modal">
        <div class="modal-content settings-modal">
            <div class="modal-header">
                <h3>Guruh sozlamalari</h3>
                <span class="close-modal" id="closeSettingsModal">&times;</span>
            </div>
            <div class="modal-body">
                <form id="groupSettingsForm">
                    <input type="hidden" id="editGroupId">
                    <div class="form-group">
                        <label>Asl nomi (Telegramdan):</label>
                        <p id="originalGroupTitle" class="readonly-text"></p>
                    </div>
                    <div class="form-group">
                        <label for="customGroupTitle">Ko'rsatiladigan nom:</label>
                        <input type="text" id="customGroupTitle" placeholder="Masalan: Bugalteriya">
                    </div>
                    <div class="form-group">
                        <label for="groupLink">Guruh linki (ixtiyoriy):</label>
                        <input type="text" id="groupLink" placeholder="https://t.me/...">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" id="cancelSettings">Bekor qilish</button>
                        <button type="submit" class="btn btn-primary">Saqlash</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- Task Modal -->
    <div id="taskModal" class="modal-overlay hidden">
        <div class="modal-container">
            <div class="modal-header">
                <h3>Yangi vazifa yaratish</h3>
                <button class="modal-close" id="taskModalClose">&times;</button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <input type="hidden" id="taskConversationId">
                    <input type="hidden" id="taskUserId">
                    <input type="hidden" id="taskGroupId">

                    <div class="form-group">
                        <label>Sarlavha:</label>
                        <input type="text" id="taskTitle" required placeholder="Vazifa nomi...">
                    </div>
                    <div class="form-group">
                        <label>Tavsif:</label>
                        <textarea id="taskDescription" rows="3" placeholder="Batafsil ma'lumot..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Prioritet:</label>
                            <select id="taskPriority">
                                <option value="low">Past</option>
                                <option value="medium" selected>O'rta</option>
                                <option value="high">Yuqori</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Muddati:</label>
                            <input type="date" id="taskDueDate">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" id="taskCancel">Bekor qilish</button>
                        <button type="submit" class="btn btn-primary">Yaratish</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/app.js"></script>
</body>

</html>
