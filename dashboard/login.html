<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Analytics — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
        }
        .login-container {
            width: 100%; max-width: 420px; padding: 20px;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .login-card .logo {
            text-align: center; margin-bottom: 32px;
        }
        .login-card .logo .icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 18px; display: inline-flex;
            align-items: center; justify-content: center;
            font-size: 28px; margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(102,126,234,0.3);
        }
        .login-card .logo h1 {
            font-size: 22px; font-weight: 600; color: #fff;
        }
        .login-card .logo p {
            font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block; font-size: 13px; font-weight: 500;
            color: rgba(255,255,255,0.6); margin-bottom: 8px;
        }
        .form-group input {
            width: 100%; padding: 14px 16px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.06);
            color: #fff; font-size: 15px; font-family: 'Inter', sans-serif;
            outline: none; transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.25); }
        .btn-login {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; font-size: 15px; font-weight: 600;
            font-family: 'Inter', sans-serif; cursor: pointer;
            transition: all 0.3s ease; margin-top: 8px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102,126,234,0.4); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg {
            text-align: center; color: #ff6b6b; font-size: 13px;
            margin-top: 16px; display: none;
        }
        .error-msg.show { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="icon">📊</div>
                <h1>Telegram Analytics</h1>
                <p>Admin Dashboard</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="admin" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login" id="btnLogin">Kirish</button>
                <div class="error-msg" id="errorMsg"></div>
            </form>
        </div>
    </div>
    <script>
        // Agar token mavjud bo'lsa, dashboardga yo'naltirish
        if (localStorage.getItem('token')) {
            window.location.href = '/';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('errorMsg');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Kirish...';
            errorMsg.classList.remove('show');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.detail || 'Login xatosi';
                    errorMsg.classList.add('show');
                }
            } catch (err) {
                errorMsg.textContent = 'Server bilan aloqa yo\'q';
                errorMsg.classList.add('show');
            }
            btn.disabled = false;
            btn.textContent = 'Kirish';
        });
    </script>
</body>
</html>
